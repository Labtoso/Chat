name: Sync Users Data

on:
  push:
    paths:
      - 'shared-users.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Verify shared-users.json
        run: |
          if [ -f shared-users.json ]; then
            echo "✅ shared-users.json found"
            cat shared-users.json | jq . > /dev/null && echo "✅ Valid JSON"
          fi
